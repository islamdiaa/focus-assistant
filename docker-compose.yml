version: "3.8"

services:
  focus-assist:
    build: .
    container_name: focus-assist
    restart: unless-stopped
    ports:
      - "1992:1992" # Main app
      # Reserve 1993 and 1994 for future services (e.g., WebSocket, admin)
    volumes:
      # Persistent data — your .md file and config live here
      - focus-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=1992
      - DATA_DIR=/app/data
      # Optional: Set a JWT secret for session cookies (auto-generated if not set)
      # - JWT_SECRET=your-secret-here
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1992/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  focus-data:
    driver: local
